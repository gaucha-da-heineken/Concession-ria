<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concessionária Digital</title>
    <style>
    body{
        text-align: center;
        font-family: Arial, Helvetica;
        background-color: #1a1a1a;
        color: white;
    }
 .card{
        border: 2px solid #ffcc00;
        width: 320px;
        margin: 15px auto;
        padding: 15px;
        border-radius: 10px;
        background-color: #2a2a2a;
        box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
    }
   .card img{
        width: 100%;
        height: 180px;
        object-fit: cover; /* corta a imagem pra caber certinho */
        border-radius: 8px;
        margin-bottom: 10px;
    }
    input, button{
        padding: 10px;
        margin: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        width: 220px;
    }
    button{
        background-color: #ffcc00;
        color: black;
        font-weight: bold;
        border: none;
        cursor: pointer;
        width: auto;
    }
    button:hover{ background-color: #e6b800; }
.btn-excluir{ background-color: #dc3545; color: white; }
.btn-excluir:hover{ background-color: #c82333; }
.preco{ font-size: 22px; color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🚗 Concessionária Digital</h1>

    <h3>Cadastrar Veículo</h3>
    <input type="text" id="imagem" placeholder="Link da Foto do Carro">
    <input type="text" id="nome" placeholder="Modelo do Carro">
    <input type="number" id="preco" placeholder="Preço R$" step="1000">
    <input type="text" id="categoria" placeholder="Marca: Ford, VW, Fiat...">
    <button onclick="adicionaritem()">Adicionar Veículo</button>

    <br><br>
    <input type="text" id="filtro" placeholder="Filtrar por Marca..." onkeyup="listarprodutos()">

    <h3>Estoque: <span id="totalItens">0</span> veículos</h3>
    <div id="cardapio"></div>

    <script>
        // Carros com imagem já
        let produtos = JSON.parse(localStorage.getItem("concessionaria")) || [
            { 
                imagem: "https://cdn.motor1.com/images/mgl/2yN3E/s3/chevrolet-onix-plus-2024.jpg",
                nome: "Onix Plus", 
                preco: 95000.00, 
                categoria: "Chevrolet" 
            },
            { 
                imagem: "https://imgd.aeplcdn.com/1920x1080/n/cw/ec/130591/hb20-exterior-right-front-three-quarter-2.jpeg",
                nome: "HB20", 
                preco: 89000.00, 
                categoria: "Hyundai" 
            }
        ];

        function salvarLocalStorage(){
            localStorage.setItem("concessionaria", JSON.stringify(produtos));
        }

        function listarprodutos(){
            let cardapio = document.getElementById("cardapio");
            let filtro = document.getElementById("filtro").value.toLowerCase();
            cardapio.innerHTML = "";
            let total = 0;

            for(let i = 0; i < produtos.length; i++){
                if(produtos[i].categoria.toLowerCase().includes(filtro)){
                    total++;
                    cardapio.innerHTML +=
                    "<div class='card'>" +
                        "<img src='" + produtos[i].imagem + "' alt='" + produtos[i].nome + "'>" + // A IMAGEM
                        "<h2>" + produtos[i].nome + "</h2>" +
                        "<p><b>Marca:</b> " + produtos[i].categoria + "</p>" +
                        "<p class='preco'>R$ " + produtos[i].preco.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + "</p>" +
                        "<button class='btn-excluir' onclick='excluiritem("+i+")'>Vender / Excluir</button>" +
                        "</div>"
                }
            }
            document.getElementById("totalItens").innerText = total;
        }

        function adicionaritem(){
            let imagem = document.getElementById("imagem").value;
            let nome = document.getElementById("nome").value;
            let preco = parseFloat(document.getElementById("preco").value);
            let categoria = document.getElementById("categoria").value;

            if(imagem == "" || nome == "" || isNaN(preco) || categoria == ""){ 
                alert("Preencha todos os campos, incluindo o link da foto!"); 
                return; 
            }

            produtos.push({ imagem: imagem, nome: nome, preco: preco, categoria: categoria });
            salvarLocalStorage();
            listarprodutos();
            
            // Limpar campos
            document.getElementById("imagem").value= "";
            document.getElementById("nome").value= "";
            document.getElementById("preco").value= "";
            document.getElementById("categoria").value= "";
        }

        function excluiritem(indice){
            if(confirm("Confirmar venda deste veículo?")){
                alert("Veículo " + produtos[indice].nome + " vendido!");
                produtos.splice(indice, 1);
                salvarLocalStorage();
                listarprodutos();
            }
        }

        listarprodutos();
    </script>
</body>
</html>
